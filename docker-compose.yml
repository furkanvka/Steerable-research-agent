services:
  app:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - app_data:/data
    environment:
      - OLLAMA_URL=http://ollama:11434
      - SEARXNG_URL=http://searxng:8080
      - DB_PATH=/data/lsa.db
    networks:
      - lsa

  searxng:
    image: searxng/searxng:latest
    volumes:
      - ./searxng:/etc/searxng
    networks:
      - lsa

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - lsa

volumes:
  app_data:
  ollama_data:

networks:
  lsa:
    driver: bridge